<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Contact Circles{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .chip { display: inline-flex; align-items: center; padding: 2px 10px;
            border-radius: 9999px; font-size: 12px; font-weight: 500; color: white; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  {% block nav %}
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-4xl mx-auto px-4 py-3 flex items-center gap-6">
      <a href="/" class="font-semibold text-indigo-600">🟣 Contact Circles</a>
      <a href="/contacts" class="text-slate-600 hover:text-slate-900">Contacts</a>
      <a href="/circles" class="text-slate-600 hover:text-slate-900">Circles</a>
      <a href="/import" class="text-slate-600 hover:text-slate-900">Import</a>
      <span class="flex-1"></span>
      <a href="/logout" class="text-slate-500 hover:text-slate-700 text-sm">Logout</a>
    </div>
  </nav>
  {% endblock %}

  <main class="max-w-4xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
